name: Publish npm packages

# Auto-publish on release is DISABLED — we're cutting releases manually from
# the laptop for now (via `pnpm --filter <pkg> publish`). To re-enable auto,
# restore `on: release: types: [published]` and the per-job `startsWith(...)`
# tag guards below. See RELEASING.md.
#
# `workflow_dispatch` keeps each job runnable manually via the GitHub UI for
# emergencies — pick which package from the input dropdown.
on:
  workflow_dispatch:
    inputs:
      package:
        description: Which package to publish
        required: true
        type: choice
        options: [sdk, cli, node]

permissions:
  contents: read

jobs:
  publish-sdk:
    name: Publish @bkey/sdk to npm
    runs-on: ubuntu-latest
    if: github.event.inputs.package == 'sdk'
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter @bkey/sdk publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-cli:
    name: Publish @bkey/cli to npm
    runs-on: ubuntu-latest
    if: github.event.inputs.package == 'cli'
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter @bkey/cli publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-node:
    name: Publish @bkey/node to npm
    runs-on: ubuntu-latest
    if: github.event.inputs.package == 'node'
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter @bkey/node test
      - run: pnpm --filter @bkey/node publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
