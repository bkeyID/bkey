name: Publish Python package

# Auto-publish on release is DISABLED — we're cutting releases manually from
# the laptop for now (via `uv build && uv publish`). To re-enable auto,
# restore `on: release: types: [published]` and the `startsWith(...)` guard
# below. See RELEASING.md.
#
# `workflow_dispatch` keeps the job runnable manually via the GitHub UI for
# emergencies.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish bkey-sdk to PyPI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv build
      - run: uv publish --token ${{ secrets.PYPI_TOKEN }}
