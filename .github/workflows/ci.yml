name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript — build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

  python:
    name: Python — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv run --with ruff ruff check bkey/
      - run: uv run --with pytest pytest tests/ -v

  yaml-lint:
    name: YAML — lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: "docs/ .github/ typescript/pnpm-workspace.yaml"
          config_data: |
            extends: default
            rules:
              line-length:
                max: 200
              truthy:
                check-keys: false
              document-start: disable

  docs-lint:
    name: Docs — markdown + MDX lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Lint markdown and MDX
        run: |
          cat > /tmp/.markdownlint.json << 'MLCFG'
          {
            "MD013": false,
            "MD024": false,
            "MD025": false,
            "MD031": false,
            "MD032": false,
            "MD033": false,
            "MD040": false,
            "MD041": false,
            "MD060": false
          }
          MLCFG
          npx markdownlint-cli "docs/**/*.mdx" "*.md" --config /tmp/.markdownlint.json
      - name: Validate Mintlify docs.json
        run: node -e "JSON.parse(require('fs').readFileSync('docs/docs.json','utf8')); console.log('docs.json valid')"
      - name: Check frontmatter in MDX files
        run: |
          for f in docs/**/*.mdx; do
            if ! head -1 "$f" | grep -q '^---'; then
              echo "Missing frontmatter: $f"
              exit 1
            fi
          done
          echo "All MDX files have frontmatter"
